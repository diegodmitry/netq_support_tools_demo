  <text x="160" y="458" fill="#13181E" font-family="Georgia, serif" font-size="58" font-weight="700">Fast to scan.</text>
  <text x="160" y="510" fill="#13181E" font-family="Georgia, serif" font-size="58" font-weight="700">Fast to use.</text>
  <text x="160" y="576" fill="#5B646F" font-family="Arial, sans-serif" font-size="23">The left side keeps one short promise; the right side holds the form and the only active call to action.</text>
