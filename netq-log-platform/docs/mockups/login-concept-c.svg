  <text x="160" y="164" fill="#88A79A" font-family="Arial, sans-serif" font-size="15" letter-spacing="4">OPTION C</text>
  <text x="160" y="234" fill="#F6EFE6" font-family="Georgia, serif" font-size="68" font-weight="700">Compact command center</text>
  <text x="160" y="276" fill="#C7D0CC" font-family="Arial, sans-serif" font-size="22">A denser operator-friendly login, but still much lighter than the current screen.</text>
